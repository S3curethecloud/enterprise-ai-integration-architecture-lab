services:
  identity-service:
    build: ./services/identity-service
    ports:
      - "8001:8000"

  cmdb-adapter:
    build: ./services/cmdb-adapter
    ports:
      - "8002:8000"

  ticketing-adapter:
    build: ./services/ticketing-adapter
    ports:
      - "8003:8000"

  audit-service:
    build: ./services/audit-service
    ports:
      - "8004:8000"
    volumes:
      - ./evidence:/app/evidence

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8000:8000"
    environment:
      IDENTITY_URL: http://identity-service:8000
      CMDB_URL: http://cmdb-adapter:8000
      TICKETING_URL: http://ticketing-adapter:8000
      AUDIT_URL: http://audit-service:8000
    depends_on:
      - identity-service
      - cmdb-adapter
      - ticketing-adapter
      - audit-service
